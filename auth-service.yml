spring:
  main:
    banner-mode: off
eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
logging:
  level:
    root: warn
spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/auth_db
    username: postgres
    password: root
    driver-class-name: org.postgresql.Driver
  sql:
    init:
      mode: always
mybatis:
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
